class="bg-deep-blue text-white px-4 py-2 rounded-full shadow-lg">↑ Top</button>

<script>
// BADGE (same)
document.querySelectorAll('.flower-card').forEach((card,i)=>{
let badge=document.createElement("span");
badge.className="badge";
badge.innerText = i%3==0?"NEW":i%4==0?"BEST":"HOT";
card.prepend(badge);
});

// SEARCH (same)
document.getElementById("searchBox").addEventListener("keyup",function(){
let value=this.value.toLowerCase();
document.querySelectorAll(".flower-card").forEach(card=>{
let name=card.querySelector("h3").innerText.toLowerCase();
card.style.display = name.includes(value) ? "block" : "none";
});
});

// FILTER (same)
const filter = document.getElementById("modeFilter");

filter.addEventListener("change", () => {
  const value = filter.value;

  document.querySelectorAll(".flower-card").forEach(card => {
    const text = card.querySelector("h3").innerText.toUpperCase();

    if (value === "ALL") card.style.display="block";
    else if (value === "BR MODE" && text.includes("BR")) card.style.display="block";
    else if (value === "CS MODE" && text.includes("CS")) card.style.display="block";
    else if (value === "LONE WOLF" && text.includes("LONE WOLF")) card.style.display="block";
    else if (value === "SNIPER MODE" && text.includes("SNIPER")) card.style.display="block";
    else if (value === "HEAD MODE" && text.includes("HEAD")) card.style.display="block";
    else card.style.display="none";
  });
});

// 🔥 ONLY CHANGE (LINK FIXED)
document.querySelectorAll(".flower-card").forEach(card=>{
  card.style.cursor="pointer";
  card.onclick=()=>{
    const mode = card.querySelector("h3").innerText.toLowerCase().replaceAll(" ","-");
    window.location.href = "modes/" + mode + ".html";
  }
});
</script>
